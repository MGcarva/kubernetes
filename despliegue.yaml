apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-web-deployment
spec:
  replicas: 2 # Creará dos copias de tu app para alta disponibilidad
  selector:
    matchLabels:
      app: mi-web
  template:
    metadata:
      labels:
        app: mi-web
    spec:
      containers:
      - name: contenedor-web
        image: mi-web-devops:latest
        imagePullPolicy: IfNotPresent
 # Le dice a K8s que busque la imagen local
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mi-web-servicio
spec:
  type: NodePort
  selector:
    app: mi-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # Este será el puerto para ver tu app en el navegador
